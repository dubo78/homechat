<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>HomeChat</title>
  <style>
    body { text-align: center; padding: 40px; font-family: sans-serif; }
    #status { font-weight: bold; color: red; margin: 20px; font-size: 18px; }
    button { padding: 15px 30px; font-size: 20px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>HomeChat</h2>
  <button id="talkBtn">말하기 켜기</button>
  <div id="status">상태: 대기 중 (마이크 꺼짐)</div>
  <audio id="remoteAudio" autoplay></audio>

  <script>
    console.log("1. 앱 스크립트 실행 시작");
    
    const dgram = require('dgram');
    const os = require('os');
    
    const PORT = 50000;
    const MULTICAST_IP = '224.0.0.114'; // 멀티캐스트 주소 추가
    const udp = dgram.createSocket('udp4');
    const myIps = Object.values(os.networkInterfaces()).flat().map(i => i.address);
    console.log("내 IP 목록:", myIps);
    
    let localStream;
    let isTalking = false;
    const peers = {};

    const talkBtn = document.getElementById('talkBtn');
    const statusDiv = document.getElementById('status');
    const remoteAudio = document.getElementById('remoteAudio');

    console.log("2. 마이크 권한 요청 중...");
    navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true }
    }).then(stream => {
      console.log("3. 마이크 권한 획득 성공");
      localStream = stream;
      localStream.getAudioTracks()[0].enabled = false;

      talkBtn.addEventListener('click', () => {
        isTalking = !isTalking;
        localStream.getAudioTracks()[0].enabled = isTalking;

        if (isTalking) {
          talkBtn.innerText = "말하기 끄기";
          statusDiv.style.color = "green";
          statusDiv.innerText = "상태: 송신 중 (마이크 켜짐)";
        } else {
          talkBtn.innerText = "말하기 켜기";
          statusDiv.style.color = "red";
          statusDiv.innerText = "상태: 대기 중 (마이크 꺼짐)";
        }
      });

      console.log("4. UDP 포트 바인딩 시도...");
      udp.bind(PORT, '0.0.0.0', () => {
        console.log("5. UDP 바인딩 성공, 멀티캐스트 설정 중...");
        udp.setBroadcast(true);
        udp.setMulticastTTL(128);
        udp.addMembership(MULTICAST_IP); // 멀티캐스트 그룹 가입
        
        setInterval(() => {
          console.log("6. 탐색 신호(hello) 전송 시도");
          sendUdp({ type: 'hello' }, MULTICAST_IP); // 멀티캐스트 주소로 전송
        }, 3000);
      });
    }).catch(err => console.error("마이크 접근 오류:", err));

    function sendUdp(msg, ip) {
      try {
        const data = Buffer.from(JSON.stringify(msg));
        udp.send(data, 0, data.length, PORT, ip, (err) => {
          if (err) console.error("UDP 전송 에러:", err);
        });
      } catch (e) {
        console.error("전송 함수 내부 에러:", e);
      }
    }

    udp.on('message', async (msg, rinfo) => {
      if (myIps.includes(rinfo.address)) return;

      try {
        const data = JSON.parse(msg.toString());
        console.log(">> 신호 받음:", data.type, "from", rinfo.address);
        
        if (!peers[rinfo.address]) {
          peers[rinfo.address] = createPeerConnection(rinfo.address);
        }
        const pc = peers[rinfo.address];

        if (data.type === 'hello') {
          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);
          sendUdp({ type: 'offer', sdp: offer }, rinfo.address);
        } else if (data.type === 'offer') {
          await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          sendUdp({ type: 'answer', sdp: answer }, rinfo.address);
        } else if (data.type === 'answer') {
          await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
        } else if (data.type === 'ice') {
          await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
        }
      } catch (e) { console.error("메시지 처리 에러:", e); }
    });

    function createPeerConnection(ip) {
      console.log("P2P 연결 생성 중:", ip);
      const pc = new RTCPeerConnection({ iceServers: [] }); 
      
      if (localStream) {
        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
      }

      pc.onicecandidate = e => {
        if (e.candidate) sendUdp({ type: 'ice', candidate: e.candidate }, ip);
      };

      pc.ontrack = e => {
        console.log("상대방 오디오 트랙 수신됨");
        if (!remoteAudio.srcObject) remoteAudio.srcObject = e.streams[0];
      };
      
      return pc;
    }
  </script>
</body>
</html>
