<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>HomeChat</title>
  <style>
    body { text-align: center; padding: 40px; font-family: sans-serif; }
    #status { font-weight: bold; color: red; margin: 20px; font-size: 18px; }
    button { padding: 15px 30px; font-size: 20px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>HomeChat</h2>
  <button id="talkBtn">말하기 켜기</button>
  <div id="status">상태: 대기 중 (마이크 꺼짐)</div>
  <audio id="remoteAudio" autoplay></audio>

  <script>
    const dgram = require('dgram');
    const os = require('os');
    
    const PORT = 50000;
    const udp = dgram.createSocket('udp4');
    const myIps = Object.values(os.networkInterfaces()).flat().map(i => i.address);
    
    let localStream;
    let isTalking = false;
    const peers = {};

    const talkBtn = document.getElementById('talkBtn');
    const statusDiv = document.getElementById('status');
    const remoteAudio = document.getElementById('remoteAudio');

    navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true }
    }).then(stream => {
      localStream = stream;
      localStream.getAudioTracks()[0].enabled = false;

      talkBtn.addEventListener('click', () => {
        isTalking = !isTalking;
        localStream.getAudioTracks()[0].enabled = isTalking;

        if (isTalking) {
          talkBtn.innerText = "말하기 끄기";
          statusDiv.style.color = "green";
          statusDiv.innerText = "상태: 송신 중 (마이크 켜짐)";
        } else {
          talkBtn.innerText = "말하기 켜기";
          statusDiv.style.color = "red";
          statusDiv.innerText = "상태: 대기 중 (마이크 꺼짐)";
        }
      });

      // 0.0.0.0으로 모든 IP 수신 허용
      udp.bind(PORT, '0.0.0.0', () => {
        udp.setBroadcast(true);
        // 3초마다 계속 탐색 신호 보내기
        setInterval(() => {
          sendUdp({ type: 'hello' }, '255.255.255.255');
        }, 3000);
      });
    }).catch(err => console.error("마이크 접근 오류:", err));

    function sendUdp(msg, ip) {
      const data = Buffer.from(JSON.stringify(msg));
      udp.send(data, 0, data.length, PORT, ip);
    }

    udp.on('message', async (msg, rinfo) => {
      if (myIps.includes(rinfo.address)) return;

      try {
        const data = JSON.parse(msg.toString());
        // 통신 로그 확인
        console.log("신호 받음:", data.type, "from", rinfo.address);
        
        if (!peers[rinfo.address]) {
          peers[rinfo.address] = createPeerConnection(rinfo.address);
        }
        const pc = peers[rinfo.address];

        if (data.type === 'hello') {
          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);
          sendUdp({ type: 'offer', sdp: offer }, rinfo.address);
        } else if (data.type === 'offer') {
          await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          sendUdp({ type: 'answer', sdp: answer }, rinfo.address);
        } else if (data.type === 'answer') {
          await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
        } else if (data.type === 'ice') {
          await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
        }
      } catch (e) { console.error(e); }
    });

    function createPeerConnection(ip) {
      const pc = new RTCPeerConnection({ iceServers: [] }); 
      
      if (localStream) {
        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
      }

      pc.onicecandidate = e => {
        if (e.candidate) sendUdp({ type: 'ice', candidate: e.candidate }, ip);
      };

      pc.ontrack = e => {
        if (!remoteAudio.srcObject) remoteAudio.srcObject = e.streams[0];
      };
      
      return pc;
    }
  </script>
</body>
</html>
